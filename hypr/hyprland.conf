# ----------------------------------------------------- 
# Keyboard Layout
# ----------------------------------------------------- 
# $keyboardlayout=de
$keyboardlayout=gb

# ----------------------------------------------------- 
# Monitor Setup
# See https://wiki.hyprland.org/Configuring/Monitors/
# ----------------------------------------------------- 
# monitor=,3840x1080@144,auto,1
# monitor=,2560x1440@120,auto,1
# monitor=,1920x1080@144,auto,1
monitor=,preferred,auto,1

# ----------------------------------------------------- 
# Autostart & Environment
# ----------------------------------------------------- 
source = ~/garudadots/hypr/conf/environment.conf
source = ~/garudadots/hypr/conf/autostart.conf

# ----------------------------------------------------- 
# Load pywal color file
# ----------------------------------------------------- 
source = ~/.cache/wal/colors-hyprland.conf

# ----------------------------------------------------- 
# Load configuration files
# ----------------------------------------------------- 
source = ~/garudadots/hypr/conf/keyboard.conf
source = ~/garudadots/hypr/conf/window.conf
source = ~/garudadots/hypr/conf/decoration.conf
source = ~/garudadots/hypr/conf/layouts.conf
source = ~/garudadots/hypr/conf/misc.conf
source = ~/garudadots/hypr/conf/keybindings.conf
source = ~/garudadots/hypr/conf/windowrules.conf
source = ~/garudadots/hypr/conf/nvidia.conf

# ----------------------------------------------------- 
# Animation
# ----------------------------------------------------- 
source = ~/garudadots/hypr/conf/animations-low.conf
# source = ~/garudadots/hypr/conf/animations-high.conf
# = Source for hyprviz
source = ./hyprviz.conf
